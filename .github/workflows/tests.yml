name: tests

on: [ push ]

jobs:
    phpunit:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: true
            matrix:
                php: [ "8.1", "8.2", "8.3", "8.4", "8.5" ]
                laravel: [ "10.0", "11.0", "12.0", "13.0" ]
                exclude:
                    -   laravel: "10.0"
                        php: "8.4"
                    -   laravel: "10.0"
                        php: "8.5"
                    -   laravel: "11.0"
                        php: "8.1"
                    -   laravel: "12.0"
                        php: "8.1"
                    -   laravel: "13.0"
                        php: "8.1"
                    -   laravel: "13.0"
                        php: "8.2"

        name: PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    extensions: curl, mbstring, zip, pcntl, pdo, pdo_sqlite, iconv
                    coverage: xdebug

            -   name: Install dependencies
                run: composer require --no-security-blocking laravel/framework:^${{ matrix.laravel }}

            -   name: Execute tests
                run: sudo vendor/bin/phpunit
